collection_name: agent
persist_diretory: chroma_db
k: 1
top_p: 9
slice_k: 50
membership_k: 50
w1: 0.9
w2: 0.1
bleu_weight: 0.75
overlap_weight: 0.25
data_path: data
md5_hex_store: md5.text
md5_log_store: md5_log.text
allow_knowledge_file_type: ["txt", "pdf", "md"]

# 模型配置
vlm_agent_type: "doubao"  # 可选: doubao (使用 mainagent_rscsv), internvl (使用 mainagent_internVL_rscsv)
chunk_size: 500 # 从 200 放大到 500，保证专业学术段落、公式、定义的完整语义
chunk_overlap: 50 # 保持 10% 左右的重叠度，防止边缘信息丢失
separators: ["\n\n", "\n", " ", ""] # 💡 移除 . 和 !，引入空格，完美适配英文语料切片，防止专业术语/浮点数被切断

# 以下是你原有的高级聚类与重排配置，保持原样：
clustering:
  n_clusters: 50
  slice_size: 5

fit_degree:
  sigma: 0.2
  update_table: true

collections:
  slices: "sar_slices_collection"
  fit_degree: "sar_fit_degree_collection"

retrieval:
  hybrid: true
  fit_threshold: 0.65
  re_rank_by_fit: true
